<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dualis Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eee;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header span { font-size: 0.9rem; opacity: 0.7; }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
        }
        .status-dot.connected { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .status-dot.disconnected { background: #ef4444; }

        .controls {
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }
        .mode-switch {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        .mode-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .mode-btn:hover { color: #fff; }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .mode-btn.active[data-mode="assistant"] {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .emotion-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.1);
        }
        .emotion-badge::before {
            content: '😊';
            margin-right: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        .message .meta {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 8px;
        }
        .message .emotion {
            display: inline-block;
            margin-right: 10px;
        }

        .input-area {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 700px;
            margin: 0 auto;
        }
        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #messageInput:focus {
            border-color: #667eea;
        }
        #sendBtn {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #sendBtn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }
        .welcome h2 { margin-bottom: 10px; }
        .welcome p { font-size: 0.9rem; }

        .memory-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .memory-toggle input {
            cursor: pointer;
        }
        .memory-disabled { opacity: 0.5; }
        .memory-disabled::after {
            content: '(Qdrant unavailable)';
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .typing {
            display: inline-flex;
            gap: 4px;
            padding: 8px 14px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🤖 Dualis</h1>
                <span>Your AI Companion & Assistant</span>
            </div>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <div class="controls">
            <div class="mode-switch">
                <button class="mode-btn active" data-mode="companion" onclick="setMode('companion')">🎭 Companion</button>
                <button class="mode-btn" data-mode="assistant" onclick="setMode('assistant')">💼 Assistant</button>
            </div>
            <span class="emotion-badge" id="emotionBadge">Neutral</span>
            <label class="memory-toggle memory-disabled">
                <input type="checkbox" id="memoryToggle" disabled>
                <span>Use Memory</span>
            </label>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome">
                <h2>Welcome to Dualis!</h2>
                <p>I'm your AI companion and assistant. Start a conversation below!</p>
                <p style="margin-top: 10px; font-size: 0.8rem;">🎭 Companion Mode: Emotional support & empathy</p>
                <p style="font-size: 0.8rem;">💼 Assistant Mode: Task execution & problem solving</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message..." autofocus>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        let currentMode = 'companion';
        let isConnected = false;

        // Check connection status
        async function checkConnection() {
            try {
                const res = await fetch('http://localhost:8000/health');
                isConnected = res.ok;
                updateStatus(isConnected);
                // Check if memory is available
                try {
                    const stateRes = await fetch(`${API_BASE}/chat/state`);
                    if (stateRes.ok) {
                        const state = await stateRes.json();
                        updateEmotion(state.emotion?.primary || 'neutral');
                    }
                } catch (e) {}
            } catch (e) {
                isConnected = false;
                updateStatus(false);
            }
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = 'Connected';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = 'Disconnected';
            }
        }

        function updateEmotion(emotion) {
            const badge = document.getElementById('emotionBadge');
            badge.textContent = emotion.charAt(0).toUpperCase() + emotion.slice(1);

            // Update emoji based on emotion
            const emojis = {
                'joy': '😊', 'sadness': '😢', 'anger': '😠', 'fear': '😨',
                'surprise': '😲', 'disgust': '🤢', 'neutral': '😐', 'excitement': '🤩',
                'contemplation': '🤔', 'empathy': '🤗', 'curiosity': '🧐', 'determination': '💪'
            };
            const emoji = emojis[emotion] || '😐';
            badge.style.cssText = `--emoji: "${emoji}"`;
            badge.innerHTML = `${emoji} ${emotion.charAt(0).toUpperCase() + emotion.slice(1)}`;
        }

        async function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            try {
                await fetch(`${API_BASE}/chat/mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_mode: mode })
                });
            } catch (e) {
                console.error('Failed to switch mode:', e);
            }
        }

        function addMessage(content, isUser, emotion = null, tokens = null) {
            const container = document.getElementById('chatContainer');
            const welcome = container.querySelector('.welcome');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'assistant'}`;
            msg.innerHTML = `
                ${content}
                ${!isUser ? `<div class="meta">
                    ${emotion ? `<span class="emotion">🎭 ${emotion.primary}</span>` : ''}
                    ${tokens ? `<span>Tokens: ${tokens}</span>` : ''}
                </div>` : ''}
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'message assistant typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            if (!isConnected) {
                await checkConnection();
                if (!isConnected) {
                    alert('Backend is not running. Start it with: ./start.sh');
                    return;
                }
            }

            addMessage(message, true);
            input.value = '';
            showTyping();

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        use_memory: false
                    })
                });

                const data = await res.json();
                hideTyping();
                addMessage(data.message, false, data.emotion, data.tokens_used);

                if (data.emotion) {
                    updateEmotion(data.emotion.primary || 'neutral');
                }
            } catch (e) {
                hideTyping();
                addMessage('⚠️ Sorry, I couldn\'t connect to the backend. Make sure it\'s running with ./start.sh', false);
            }
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Check connection on load and periodically
        checkConnection();
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
